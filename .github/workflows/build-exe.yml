name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install pandas openpyxl rapidfuzz pyinstaller

    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name "Generator Faktur" generator_faktur.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Generator-Faktur-Windows
        path: dist/Generator Faktur.exe
